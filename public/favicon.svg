<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Outer ring - field boundary -->
  <circle cx="24" cy="24" r="22" stroke="#22c55e" stroke-width="3" fill="none"/>
  <!-- Inner rings - crop circles -->
  <circle cx="24" cy="24" r="16" stroke="#16a34a" stroke-width="2" fill="none"/>
  <circle cx="24" cy="24" r="10" stroke="#15803d" stroke-width="1.5" fill="none"/>
  <!-- Center dot - focal point -->
  <circle cx="24" cy="24" r="3" fill="#22c55e"/>
  <!-- Crosshairs for precision -->
  <line x1="24" y1="6" x2="24" y2="14" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="34" x2="24" y2="42" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="6" y1="24" x2="14" y2="24" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="34" y1="24" x2="42" y2="24" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
</svg>