<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" fill="none">
  <defs>
    <linearGradient id="outerRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bbf7d0"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
  </defs>

  <!-- Base circle - field from above -->
  <circle cx="96" cy="96" r="90" fill="url(#outerRing)"/>

  <!-- Outer ring - represents boundary -->
  <circle cx="96" cy="96" r="84" fill="none" stroke="#166534" stroke-width="3"/>

  <!-- Crop ring 1 - outer crop circle pattern -->
  <circle cx="96" cy="96" r="70" fill="none" stroke="url(#innerGlow)" stroke-width="6" stroke-opacity="0.85"/>

  <!-- Crop ring 2 - middle ring -->
  <circle cx="96" cy="96" r="54" fill="none" stroke="#86efac" stroke-width="5" stroke-opacity="0.8"/>

  <!-- Crop ring 3 - inner ring -->
  <circle cx="96" cy="96" r="38" fill="none" stroke="#4ade80" stroke-width="5" stroke-opacity="0.9"/>

  <!-- Center - healthy crop emergence point -->
  <circle cx="96" cy="96" r="18" fill="#166534"/>
  <circle cx="96" cy="96" r="12" fill="url(#centerGrad)"/>
  <circle cx="96" cy="96" r="5" fill="#ffffff" fill-opacity="0.9"/>

  <!-- Growth indicator dots at cardinal points (subtle) -->
  <circle cx="96" cy="20" r="4" fill="#bbf7d0" fill-opacity="0.6"/>
  <circle cx="96" cy="172" r="4" fill="#bbf7d0" fill-opacity="0.6"/>
  <circle cx="20" cy="96" r="4" fill="#bbf7d0" fill-opacity="0.6"/>
  <circle cx="172" cy="96" r="4" fill="#bbf7d0" fill-opacity="0.6"/>

  <!-- Subtle earth tone arc - bottom -->
  <path d="M36 158 Q96 148 156 158" stroke="#a3a3a3" stroke-width="4" stroke-linecap="round" fill="none" stroke-opacity="0.3"/>
</svg>